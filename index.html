</script>
    <style>  
        /* Modern iOS System Reset & Engine Optimization */  
        * {  
            box-sizing: border-box;  
            -webkit-font-smoothing: antialiased;  
            -moz-osx-font-smoothing: grayscale;  
        }  
          
        body, html {  
            margin: 0;  
            padding: 0;  
            background-color: #0D0B1E;  
            color: #ffffff;  
            font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, sans-serif;  
            overflow-x: hidden;  
            background: #0D0B1E;  
            -webkit-tap-highlight-color: transparent;  
            /* Prevent iOS rubber-band scroll bounce causing black edges */
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
        }  
  
        /* Input field cross-platform standardization */  
        input::-webkit-inner-spin-button,  
        input::-webkit-outer-spin-button {  
            -webkit-appearance: none;  
            margin: 0;  
        }  
        input[type=number] {  
            -moz-appearance: textfield;  
        }
        /* iOS date/time input fix — prevent invisible text */
        input[type=date],
        input[type=time] {
            -webkit-appearance: none;
            appearance: none;
            color: #ffffff !important;
            color-scheme: dark;
        }
        input[type=date]::-webkit-datetime-edit,
        input[type=time]::-webkit-datetime-edit {
            color: #ffffff;
        }
        input[type=date]::-webkit-calendar-picker-indicator,
        input[type=time]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.7;
        }
        input::placeholder {  
            color: #48484A;  
        }  
  
        /* Custom Webkit scrollbar masking (Keeps layouts pure) */  
        ::-webkit-scrollbar {  
            display: none;  
        }  
  
        /* CSS Animation Sequences */  
        @keyframes slideUp {  
            from {  
                transform: translateY(100%);  
                opacity: 0;  
            }  
            to {  
                transform: translateY(0);  
                opacity: 1;  
            }  
        }
        @keyframes pinShake {
            0%,100% { transform: translateX(0); }
            15%      { transform: translateX(-8px); }
            35%      { transform: translateX(8px); }
            55%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
            90%      { transform: translateX(-3px); }
        }

        /* ── Apple Glass UI Shimmer & Depth Effects ─────────────────── */
        @keyframes glassShimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes glassFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-3px); }
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 1; }
        }
        /* ── Chart entrance & interaction animations ─────────────────── */
        @keyframes chartFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes dashDraw {
            from { stroke-dashoffset: 1; }
            to   { stroke-dashoffset: 0; }
        }
        @keyframes chartPulse {
            0%   { transform: scale(1);   opacity: 0.7; }
            60%  { transform: scale(2.8); opacity: 0; }
            100% { transform: scale(2.8); opacity: 0; }
        }
        @keyframes barRise {
            from { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
            to   { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
        }
        @keyframes shimmer {
            0%   { opacity: 0.6; }
            50%  { opacity: 1; }
            100% { opacity: 0.6; }
        }
        @keyframes tooltipPop {
            from { opacity: 0; transform: scale(0.85) translateY(4px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        /* Ambient orbs for glass themes — injected via JS */
        .glass-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: glowPulse 6s ease-in-out infinite;
        }
        /* Glass card hover shimmer effect */
        .glass-card-shimmer::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: glassShimmer 3s linear infinite;
            border-radius: inherit;
            pointer-events: none;
        }

        /* ── AI Bot FAB Button styles ───────────────────────────────────── */
        @keyframes fabMenuIn {
            0%   { opacity: 0; transform: scale(0.72) translateY(10px); }
            100% { opacity: 1; transform: scale(1)    translateY(0); }
        }
        @keyframes fabEntrance {
            from { opacity: 0; transform: translateX(-50%) translateY(24px) scale(0.7); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes aiBotGlow {
            0%   { box-shadow: var(--bot-glow-a, 0 0 12px 3px rgba(191,90,242,0.55)), var(--bot-glow-b, 0 0 28px 6px rgba(255,107,157,0.30)), 0 4px 20px rgba(0,0,0,0.5); }
            40%  { box-shadow: var(--bot-glow-peak-a, 0 0 22px 8px rgba(191,90,242,0.85)), var(--bot-glow-peak-b, 0 0 50px 16px rgba(255,107,157,0.55)), 0 4px 24px rgba(0,0,0,0.5); }
            70%  { box-shadow: var(--bot-glow-mid-a, 0 0 18px 6px rgba(100,210,255,0.72)), var(--bot-glow-mid-b, 0 0 38px 12px rgba(191,90,242,0.48)), 0 4px 20px rgba(0,0,0,0.5); }
            100% { box-shadow: var(--bot-glow-a, 0 0 12px 3px rgba(191,90,242,0.55)), var(--bot-glow-b, 0 0 28px 6px rgba(255,107,157,0.30)), 0 4px 20px rgba(0,0,0,0.5); }
        }

    <!-- iOS crash fallback — shown if React fails to mount -->
    <div id="ios-error-fallback">
        <div style="font-size:56px;margin-bottom:16px">⚠️</div>
        <h2>App failed to load</h2>
        <p>This may happen in Private Browsing mode on iPhone.<br>Try opening in a regular Safari tab, or tap below to reload.</p>

    <script>
    // ═══════════════════════════════════════════════════
    // MULTI-TIER STORAGE LAYER
    // Priority: window.storage (artifact) → localStorage → memory
    // All writes are mirrored in _memStore for sync reads.
    // Errors are caught silently; app always stays functional.
    // ═══════════════════════════════════════════════════
    (function() {
        var _memStore = {};

        // ── Tier detection ───────────────────────────────
        // Tier 1: Claude artifact persistent storage (async, cross-session)
        var _useWS = false;
        try { _useWS = typeof window.storage !== 'undefined' && typeof window.storage.set === 'function'; } catch(e) {}

        // Tier 2: localStorage (standard browser, blocked in Private/artifact)
        var _useLS = false;
        if (!_useWS) {
            try {
                var _t = '__ft_t__';
                localStorage.setItem(_t, '1');
                localStorage.removeItem(_t);
                _useLS = true;
            } catch(e) {}
        }

        // ── Sync write helper (fire-and-forget to async backends) ─────
        function _persist(k, v) {
            if (_useWS) {
                // window.storage.set can fail — swallow silently
                try { window.storage.set(k, v).catch(function(){}); } catch(e) {}
            } else if (_useLS) {
                try { localStorage.setItem(k, v); } catch(e) { _useLS = false; }
            }
        }
        function _remove(k) {
            if (_useWS) {
                try { window.storage.delete(k).catch(function(){}); } catch(e) {}
            } else if (_useLS) {
                try { localStorage.removeItem(k); } catch(e) {}
            }
        }

        window.__safeStorage = {
            getItem:    function(k) { return _memStore[k] !== undefined ? _memStore[k] : null; },
            setItem:    function(k, v) { _memStore[k] = v; _persist(k, v); },
            removeItem: function(k) { delete _memStore[k]; _remove(k); },
            isMemoryOnly: !_useWS && !_useLS
        };

        // ── Boot: pre-load persisted data before React mounts ────────
        var KNOWN_KEYS = ['ft_entries_v4','ft_cats_v4','ft_items_v4',
                          'ft_settings_v1','ft_budgets_v1','ft_pin_v1'];
        window.__storageReady = false;

        function _markReady() {
            window.__storageReady = true;
            window.dispatchEvent(new Event('__storageReady'));
        }

        if (_useWS) {
            // Async: load all keys from window.storage into memory cache first
            var pending = KNOWN_KEYS.length;
            KNOWN_KEYS.forEach(function(k) {
                try {
                    window.storage.get(k).then(function(r) {
                        if (r && r.value != null) _memStore[k] = r.value;
                        if (--pending === 0) _markReady();
                    }).catch(function() {
                        if (--pending === 0) _markReady();
                    });
                } catch(e) {
                    if (--pending === 0) _markReady();
                }
            });
            // Safety: mark ready after 3s regardless
            setTimeout(function() { if (!window.__storageReady) _markReady(); }, 3000);
        } else {
            // Sync: load from localStorage immediately
            if (_useLS) {
                KNOWN_KEYS.forEach(function(k) {
                    try { var v = localStorage.getItem(k); if (v != null) _memStore[k] = v; } catch(e) {}
                });
            }
            _markReady();
        }
    })();

    // Global error catcher — shows fallback UI instead of black screen
    window.onerror = function(msg, src, line, col, err) {
        console.error('[FinanceApp] Uncaught error:', msg, err);
        var el = document.getElementById('root');
        var fb = document.getElementById('ios-error-fallback');
        if (el && (!el.children.length || el.innerHTML.trim() === '')) {
            if (fb) fb.classList.add('visible');
        }
        return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
        console.error('[FinanceApp] Unhandled promise rejection:', e.reason);
    });
    
    // Show fallback if React hasn't mounted after 5 seconds
    setTimeout(function() {
        var root = document.getElementById('root');
        var fb = document.getElementById('ios-error-fallback');
        if (root && fb && (!root.children.length || root.innerHTML.trim() === '')) {
            fb.classList.add('visible');
        }
    }, 5000);
    </script>

// Animates a number from 0 → target over ~500ms with ease-out.
// Returns the formatted string (৳ prefix + locale-formatted integer).
// Pass `target` as a raw number; re-triggers whenever target key changes.
function useCountUp(target, duration) {

    startVal.current = display;
    startTs.current = null;
    targetRef.current = target;

      if (!startTs.current) startTs.current = now;
      const elapsed = now - startTs.current;

          title: 'Finance Backup',

        });
        setStatus("Exported via Share! ✅");
        return;
      }
    } catch (err) {
      console.log("Web Share API failed/cancelled", err);
    }

    // 2. Try standard Blob download (Fallback for Desktop/Android)
    try {
      const b = new Blob([txt], {
        type: mimeType
      });
      const u = URL.createObjectURL(b);
      const a = document.createElement("a");
      a.href = u;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(u);
      setStatus("Download triggered! ✅");

      // 3. Ultimate Fallback: Clipboard
      try {
        navigator.clipboard.writeText(txt);

  async function doMonthlyPNG() {
    setStatus("Generating PNG…");
    // Canvas-safe amount formatter — avoids Bengali Taka ৳ (U+09F3) which
    // most canvas system fonts cannot render, causing blank amount cells.
    function fmtPNG(n) {
      return "Tk " + new Intl.NumberFormat("en-BD", { maximumFractionDigits: 0 }).format(n || 0);
    }
    const monthLabel = fmtMonthLabel(exportMonth);
    const data = getMonthData(exportMonth);
    const { incList, expList, incTotal, expTotal, labelFor } = data;
    const bal = incTotal - expTotal;
    const rate = incTotal > 0 ? Math.round((incTotal - expTotal) / incTotal * 100) : 0;

    // --- Layout constants ---
    const W = 900;
    const PAD = 28;
    const COL_W = [90, 230, 160, 120, 220]; // Date, Description, Category, Amount, Note
    const ROW_H = 26;
    const HDR_H = 34;
    const SECTION_TITLE_H = 38;
    const TABLE_TOP_PAD = 6;

    // helpers
    function tableHeight(rows) {
      return SECTION_TITLE_H + TABLE_TOP_PAD + HDR_H + Math.max(rows.length, 1) * ROW_H + ROW_H; // +1 for total row
    }
    const SUMMARY_H = 90;
    const TITLE_H = 80;
    const DIVIDER = 14;
    const totalH = TITLE_H + tableHeight(incList) + DIVIDER + tableHeight(expList) + DIVIDER + SUMMARY_H + PAD;

    const canvas = document.createElement('canvas');
    const DPR = 2; // retina
    canvas.width = W * DPR;
    canvas.height = totalH * DPR;
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    // Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, totalH);

    // --- Utility drawing helpers ---
    function roundRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
    }

    // Hard-clip text inside a cell rectangle — prevents ANY overflow into adjacent columns.
    // Uses canvas save/rect/clip/restore so even long unicode text is pixel-clamped.
    function drawCellText(text, color, font, align, cellX, cellY, cellW, cellH) {
      if (!text) return;
      ctx.save();
      // Clip region: inner cell with 4px inset on each side for breathing room
      const INSET = 4;
      ctx.beginPath();
      ctx.rect(cellX + INSET, cellY, cellW - INSET * 2, cellH);
      ctx.clip();

      ctx.fillStyle = color;
      ctx.font = font;
      ctx.textAlign = align;
      ctx.textBaseline = 'middle';
      const tx = align === 'right' ? cellX + cellW - 8 : cellX + 8;
      ctx.fillText(text, tx, cellY + cellH / 2);
      ctx.restore();
      ctx.textBaseline = 'alphabetic'; // reset
    }

    function drawTable(startY, title, titleBg, rows, totLabel, totAmt, totColor) {
      let y = startY;

      // Section title bar — clipped so long month labels don't escape
      roundRect(PAD, y, W - PAD * 2, SECTION_TITLE_H, 6, titleBg);
      ctx.save();
      ctx.beginPath();
      ctx.rect(PAD + 8, y, W - PAD * 2 - 16, SECTION_TITLE_H);
      ctx.clip();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 14px -apple-system, Arial, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(title, PAD + 14, y + SECTION_TITLE_H / 2);
      ctx.restore();
      ctx.textBaseline = 'alphabetic';
      y += SECTION_TITLE_H + TABLE_TOP_PAD;

      // Column header row
      const colLabels = ['Date', 'Description', 'Category', 'Amount', 'Note'];
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(PAD, y, W - PAD * 2, HDR_H);
      ctx.strokeStyle = '#cccccc';
      ctx.lineWidth = 1;
      ctx.strokeRect(PAD, y, W - PAD * 2, HDR_H);
      let cx = PAD;
      for (let i = 0; i < colLabels.length; i++) {
        const align = i === 3 ? 'right' : 'left';
        drawCellText(colLabels[i], '#444444', 'bold 11px -apple-system, Arial, sans-serif', align, cx, y, COL_W[i], HDR_H);
        // vertical divider
        if (i < colLabels.length - 1) {
          ctx.strokeStyle = '#cccccc';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(cx + COL_W[i], y);
          ctx.lineTo(cx + COL_W[i], y + HDR_H);
          ctx.stroke();
        }
        cx += COL_W[i];
      }
      y += HDR_H;

      // Data rows (or empty placeholder)

      for (let ri = 0; ri < rowsToRender.length; ri++) {
        const entry = rowsToRender[ri];
        const rowBg = entry === null
          ? '#f9f9f9'
          : (ri % 2 === 0 ? (totColor === '#1a7a3a' ? '#f4fff7' : '#fff5f5') : '#ffffff');
        ctx.fillStyle = rowBg;
        ctx.fillRect(PAD, y, W - PAD * 2, ROW_H);
        ctx.strokeStyle = '#e5e5e5';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(PAD, y, W - PAD * 2, ROW_H);

        if (entry === null) {
          drawCellText('No records this month', '#aaaaaa', '11px -apple-system, Arial, sans-serif', 'center', PAD, y, W - PAD * 2, ROW_H);
        } else {
          const lbl = labelFor(entry);
          const desc = lbl.item || lbl.sub || lbl.cat;
          const dateStr = (function(d) {
            const dt = new Date(d);
            return dt.getDate().toString().padStart(2,'0') + '/' +
                   (dt.getMonth()+1).toString().padStart(2,'0') + '/' +
                   dt.getFullYear();
          })(entry.date);
          const cells = [
            { text: dateStr,                                                              color: '#555',     align: 'left',  bold: false },

  return s.length%2 ? s[mid] : (s[mid-1]+s[mid])/2;
}
function _iqr(arr) {
  if (arr.length < 4) return 0;
  const s = [...arr].sort((a,b)=>a-b);
  const q1 = s[Math.floor(s.length*0.25)];
  const q3 = s[Math.floor(s.length*0.75)];
  return q3 - q1;
}
function _lastNMonths(entries, type, n) {
  // returns per-month totals for the LAST n full months (excludes current)
  const now = new Date();
  const result = [];
  for (let i = 1; i <= n; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const total = entries.filter(e=>e.type===type && _mKey(e.date)===k).reduce((s,e)=>s+e.amount,0);
    result.push({ month: k, total, label: d.toLocaleString("en-GB",{month:"short"}) });
  }
  return result.reverse();
}

// ── 1. ADAPTIVE PATTERN MEMORY (exponential weighted avg) ────────────────────
function aiPatternMemory(entries) {
  if (!entries.length) return null;
  const now = new Date();
  const dayOfWeek = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Weighted recent bias: entries in last 30 days count 3×, last 90 days 2×, older 1×
  function weight(iso) {
    const age = (now - new Date(iso)) / 86400000;
    return age <= 30 ? 3 : age <= 90 ? 2 : 1;
  }

  // Day-of-week weighted avg
  const dowWSpend = Array(7).fill(0), dowWCount = Array(7).fill(0);
  entries.forEach(e => {
    if (e.type !== "expense") return;
    const d = new Date(e.date).getDay();
    const w = weight(e.date);
    dowWSpend[d] += e.amount * w;
    dowWCount[d] += w;
  });
  const dowAvg = dowWSpend.map((s,i) => dowWCount[i]>0 ? s/dowWCount[i] : 0);
  const peakDow = dowAvg.indexOf(Math.max(...dowAvg));
  const cheapDow = dowAvg.map((v,i)=>({v,i})).filter(x=>x.v>0).sort((a,b)=>a.v-b.v)[0];

  // Hour buckets
  const hBuckets = {morning:0,afternoon:0,evening:0,night:0};
  entries.forEach(e => {
    if (e.type !== "expense") return;
    const h = new Date(e.date).getHours();
    const k = h>=5&&h<12?"morning":h>=12&&h<17?"afternoon":h>=17&&h<21?"evening":"night";
    hBuckets[k] += e.amount * weight(e.date);
  });
  const topHour = Object.entries(hBuckets).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Category spend fingerprint (weighted %)
  const catTotals = {};
  const totalW = entries.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount*weight(e.date),0);
  entries.forEach(e=>{
    if(e.type!=="expense"||!e.catId)return;
    catTotals[e.catId] = (catTotals[e.catId]||0) + e.amount*weight(e.date);
  });
  const catDNA = Object.entries(catTotals)
    .map(([id,wAmt])=>({id, pct: totalW>0 ? Math.round(wAmt/totalW*100):0}))
    .sort((a,b)=>b.pct-a.pct);

  // Average & median transaction
  const expAmts = entries.filter(e=>e.type==="expense"&&e.amount>0).map(e=>e.amount);
  const avgTx = _mean(expAmts);
  const medTx = _median(expAmts);

  // Monthly income / expense (last 6 months)
  const incMonths = _lastNMonths(entries,"income",6).map(m=>m.total);
  const expMonths = _lastNMonths(entries,"expense",6).map(m=>m.total);
  const avgIncome  = _mean(incMonths.filter(v=>v>0));
  const avgExpense = _mean(expMonths.filter(v=>v>0));

  // Trend: is spending rising or falling?
  const recentExp = expMonths.slice(-3);
  const olderExp  = expMonths.slice(0,3);
  const trendDir  = _mean(recentExp) > _mean(olderExp)*1.05 ? "rising" : _mean(recentExp) < _mean(olderExp)*0.95 ? "falling" : "stable";

  return { dowAvg, peakDow, peakDowLabel: dayOfWeek[peakDow], cheapDowLabel: cheapDow ? dayOfWeek[cheapDow.i] : null, topHour, catDNA, avgTx, medTx, avgIncome, avgExpense, trendDir };
}

// ── 2. MULTI-HORIZON FORECASTING ─────────────────────────────────────────────
function aiMultiForecast(entries) {
  const now = new Date();
  const dayOfMonth = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const daysLeft = daysInMonth - dayOfMonth;
  const curMon = _mKey(now.toISOString());

  const curExp = entries.filter(e=>e.type==="expense"&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);
  const curInc = entries.filter(e=>e.type==="income"  &&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);

  // Historical daily burn (from last 3 full months)
  const histDailyBurns = [];
  for (let i=1;i<=3;i++){
    const d = new Date(now.getFullYear(),now.getMonth()-i,1);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const dIM = new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const total = entries.filter(e=>e.type==="expense"&&_mKey(e.date)===k).reduce((s,e)=>s+e.amount,0);
    if(total>0) histDailyBurns.push(total/dIM);
  }
  const histDailyBurn = _mean(histDailyBurns);
  const curDailyBurn  = dayOfMonth>0 ? curExp/dayOfMonth : 0;
  // Blend current pace (60%) with historical (40%) for better accuracy
  const blendedBurn = histDailyBurn>0 ? curDailyBurn*0.6 + histDailyBurn*0.4 : curDailyBurn;

  if (blendedBurn === 0 || dayOfMonth < 2) return null;

  // Projections
  const projMonth    = curExp + blendedBurn * daysLeft;
  const proj7d       = curExp + blendedBurn * 7;
  const proj14d      = curExp + blendedBurn * 14;
  const balMonth     = curInc - projMonth;
  const savingsRate  = curInc>0 ? Math.round((curInc-curExp)/curInc*100) : null;
  const projSavRate  = curInc>0 ? Math.round((curInc-projMonth)/curInc*100) : null;

  // Break-even day (which day will expenses = income)
  const breakEvenDayNum = curInc>curExp && blendedBurn>0 ? Math.ceil((curInc-curExp)/blendedBurn) : null;
  const breakEvenDate   = breakEvenDayNum ? new Date(now.getFullYear(),now.getMonth(),dayOfMonth+breakEvenDayNum) : null;

  return { curExp, curInc, daysLeft, dayOfMonth, daysInMonth, blendedBurn, projMonth, proj7d, proj14d, balMonth, savingsRate, projSavRate, breakEvenDate, histDailyBurn, curDailyBurn };
}

// ── 3. SMART ANOMALY ENGINE (Z-score + IQR dual method) ──────────────────────
function aiAnomalies(entries, cats) {
  const now = new Date();
  const curMon = _mKey(now.toISOString());
  const anomalies = [];

  // Per-category spike detection
  for (const cat of (cats.expenses||[])) {
    const monthly = [];
    for (let i=1;i<=6;i++){
      const d = new Date(now.getFullYear(),now.getMonth()-i,1);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const t = entries.filter(e=>e.type==="expense"&&e.catId===cat.id&&_mKey(e.date)===k).reduce((s,e)=>s+e.amount,0);
      monthly.push(t);
    }
    const withData = monthly.filter(v=>v>0);
    if (withData.length < 2) continue;

    const curAmt = entries.filter(e=>e.type==="expense"&&e.catId===cat.id&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);
    if (curAmt < 300) continue;

    const mu  = _mean(withData);
    const sig = _stddev(withData);
    const iqr = _iqr(withData);
    const zScore = sig>0 ? (curAmt-mu)/sig : 0;
    const iqrFlag = iqr>0 && curAmt > _median(withData)+1.5*iqr;

    if (zScore > 1.5 || (iqrFlag && curAmt > mu*1.4)) {
      const spike = mu>0 ? Math.round((curAmt-mu)/mu*100) : 100;
      anomalies.push({ cat, curAmt, mu, sig, zScore: +zScore.toFixed(1), spike, method: zScore>2?"z-score":"iqr" });
    }
  }

  // Large single-transaction detector (recent 7 days)
  const allExp = entries.filter(e=>e.type==="expense"&&e.amount>0);
  if (allExp.length>=8){
    const amts   = allExp.map(e=>e.amount);
    const median = _median(amts);
    const iqrVal = _iqr(amts);
    const threshold = Math.max(median+2.5*iqrVal, median*3);
    const recent7 = allExp.filter(e=>(now-new Date(e.date))<7*86400000);
    recent7.filter(e=>e.amount>threshold).forEach(e=>{
      const cat = (cats.expenses||[]).find(c=>c.id===e.catId);
      if(cat) anomalies.push({ cat, curAmt:e.amount, mu:median, zScore:null, spike:Math.round((e.amount/median-1)*100), isSingleTx:true, txNote:e.note, txDate:e.date });
    });
  }

  return anomalies.sort((a,b)=>b.spike-a.spike).slice(0,4);
}

// ── 4. RECURRING PAYMENT DETECTOR ────────────────────────────────────────────
function aiDetectRecurring(entries, cats) {
  // Find expenses that appear on roughly the same day each month
  const recurring = [];
  const expByCat = {};
  entries.filter(e=>e.type==="expense").forEach(e=>{
    const k = e.catId + "|" + (e.note||"").toLowerCase().trim();
    (expByCat[k] = expByCat[k]||[]).push(e);
  });

  for (const [key, grp] of Object.entries(expByCat)) {
    if (grp.length < 2) continue;
    const amounts = grp.map(e=>e.amount);
    const amountConsistent = _stddev(amounts) / _mean(amounts) < 0.15; // <15% variation
    if (!amountConsistent && _mean(amounts) < 200) continue;

    // Check if days-of-month are similar
    const days = grp.map(e=>new Date(e.date).getDate());
    const dayStd = _stddev(days);
    if (dayStd > 5) continue; // too irregular

    const [catId, note] = key.split("|");
    const cat = (cats.expenses||[]).find(c=>c.id===catId);
    if (!cat) continue;

    const avgAmt  = Math.round(_mean(amounts));
    const avgDay  = Math.round(_mean(days));
    const now = new Date();
    const curMon = _mKey(now.toISOString());
    const paidThisMonth = grp.some(e=>_mKey(e.date)===curMon);

    recurring.push({ cat, note, avgAmt, avgDay, count: grp.length, paidThisMonth });
  }

  return recurring.sort((a,b)=>b.avgAmt-a.avgAmt).slice(0,5);
}

// ── 5. SAVINGS STREAK TRACKER ─────────────────────────────────────────────────
function aiStreaks(entries) {
  const now = new Date();
  // Check each of last 12 months: was it a "savings month" (income > expense)?
  const monthResults = [];
  for (let i=0; i<12; i++){
    const d = new Date(now.getFullYear(),now.getMonth()-i,1);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const inc = entries.filter(e=>e.type==="income" &&_mKey(e.date)===k).reduce((s,e)=>s+e.amount,0);
    const exp = entries.filter(e=>e.type==="expense"&&_mKey(e.date)===k).reduce((s,e)=>s+e.amount,0);
    if(inc===0&&exp===0){monthResults.push(null);continue;}
    monthResults.push(inc>exp);
  }

  // Current streak (consecutive from most recent)
  let streak = 0;
  for (const r of monthResults) {
    if (r === null) break;
    if (r === true) streak++;
    else break;
  }

  // Best streak ever
  let best=0,cur=0;
  for(const r of [...monthResults].reverse()){
    if(r===true){cur++;best=Math.max(best,cur);}else{cur=0;}
  }

  // Total saving months out of data available
  const dataMonths = monthResults.filter(r=>r!==null);
  const savingMonths = dataMonths.filter(r=>r===true).length;

  return { streak, best, savingMonths, totalMonths: dataMonths.length };
}

// ── 6. FINANCIAL FITNESS SCORE (composite 0-100) ──────────────────────────────
function aiFitnessScore(entries, budgets, cats) {
  const now = new Date();
  const components = {};

  // A) Savings Rate Score (0-30 pts) — most important
  const months3 = _lastNMonths(entries,"expense",3);
  const incMonths3 = _lastNMonths(entries,"income",3);
  const rates = months3.map((m,i)=>{
    const inc = incMonths3[i]?.total||0;
    return inc>0 ? Math.max(0,(inc-m.total)/inc*100) : null;
  }).filter(v=>v!==null);
  const avgRate = _mean(rates);
  components.savings = Math.min(30, Math.round(avgRate * 1.5)); // 20% rate = 30 pts

  // B) Budget Adherence Score (0-25 pts)
  const budgetCats = Object.keys(budgets).filter(id=>budgets[id]>0);
  if(budgetCats.length>0){
    const adherenceScores = budgetCats.map(catId=>{
      const curMon = _mKey(now.toISOString());
      const spent = entries.filter(e=>e.type==="expense"&&e.catId===catId&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);
      const budget = budgets[catId];
      return spent<=budget ? 100 : Math.max(0,100-(spent/budget-1)*100);
    });
    components.budget = Math.round(_mean(adherenceScores)*0.25);
  } else {
    components.budget = 12; // neutral if no budget set
  }

  // C) Spending Trend Score (0-20 pts) — falling trend = good
  const expLast3 = _lastNMonths(entries,"expense",3).map(m=>m.total).filter(v=>v>0);
  const expPrev3 = _lastNMonths(entries,"expense",6).slice(0,3).map(m=>m.total).filter(v=>v>0);
  if(expLast3.length>=2&&expPrev3.length>=2){
    const trend = (_mean(expLast3)-_mean(expPrev3))/_mean(expPrev3)*100;
    components.trend = trend<=-10?20:trend<=0?15:trend<=10?10:trend<=20?5:0;
  } else { components.trend = 10; }

  // D) Income Stability Score (0-15 pts)
  const incData = _lastNMonths(entries,"income",6).map(m=>m.total).filter(v=>v>0);
  if(incData.length>=2){
    const cv = _stddev(incData)/_mean(incData); // coefficient of variation
    components.income = cv<0.1?15:cv<0.2?12:cv<0.35?8:cv<0.5?4:1;
  } else { components.income = 7; }

  // E) Streak Bonus (0-10 pts)
  const streaks = aiStreaks(entries);
  components.streak = Math.min(10, streaks.streak*2);

  const total = Object.values(components).reduce((a,b)=>a+b,0);
  const score = Math.min(100, Math.round(total));

  const grade = score>=90?"A+"  :score>=80?"A":score>=70?"B+":score>=60?"B":score>=50?"C+":score>=40?"C":score>=30?"D":"F";
  const color = score>=80?"#34C759":score>=60?"#30D158":score>=45?"#FF9F0A":score>=30?"#FF6B35":"#FF453A";
  const label = score>=85?"Excellent 🌟":score>=70?"Great 💪":score>=55?"Good 👍":score>=40?"Fair 📊":score>=25?"Low ⚠️":"Critical 🚨";

  return { score, grade, color, label, components, avgRate: Math.round(avgRate) };
}

// ── 7. GOAL SIMULATOR — "what if I cut X by Y%?" ─────────────────────────────
function aiGoalSimulate(entries, cats) {
  const now = new Date();
  // Find top 3 expense categories this month
  const curMon = _mKey(now.toISOString());
  const catAmts = (cats.expenses||[]).map(cat=>({
    cat,
    amt: entries.filter(e=>e.type==="expense"&&e.catId===cat.id&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0)
  })).filter(x=>x.amt>300).sort((a,b)=>b.amt-a.amt).slice(0,3);

  const curInc = entries.filter(e=>e.type==="income"&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);
  const curTotalExp = entries.filter(e=>e.type==="expense"&&_mKey(e.date)===curMon).reduce((s,e)=>s+e.amount,0);

  return catAmts.map(({cat,amt})=>{
    const cut20 = amt*0.20;
    const newTotal = curTotalExp - cut20;
    const newBalance = curInc - newTotal;
    return { cat, currentAmt: amt, cut20: Math.round(cut20), newBalance: Math.round(newBalance) };
  });
}

// ── 8. CASH-FLOW CALENDAR — predict heavy-spend days ─────────────────────────
function aiCashFlowCalendar(entries) {
  // Based on historical day-of-month patterns, flag upcoming risky days
  const now = new Date();
  const dayOfWeek = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dayAmts = Array.from({length:31},(_,i)=>({day:i+1,amounts:[]}));

  entries.filter(e=>e.type==="expense").forEach(e=>{
    const dom = new Date(e.date).getDate();
    dayAmts[dom-1].amounts.push(e.amount);
  });

  const dayAvgs = dayAmts.map(d=>({day:d.day, avg:_mean(d.amounts), count:d.amounts.length})).filter(d=>d.count>=2);
  const globalAvg = _mean(dayAvgs.map(d=>d.avg));

  // Find next 7 days that are historically high-spend
  const upcoming = [];
  for(let i=1;i<=7;i++){
    const futureDate = new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);
    const dom = futureDate.getDate();
    const dayData = dayAvgs.find(d=>d.day===dom);
    if(dayData && dayData.avg > globalAvg*1.3){
      upcoming.push({
        date: futureDate,
        dom,
        dayLabel: dayOfWeek[futureDate.getDay()],
        avgSpend: Math.round(dayData.avg),
        isRisky: dayData.avg > globalAvg*1.6
      });
    }
  }
  return upcoming;
}

// ── 9. SMART COACH (personalised text advice) ────────────────────────────────
function aiCoach(entries, cats, budgets, fitness) {
  const now = new Date();
  const patterns = aiPatternMemory(entries);
  const forecast  = aiMultiForecast(entries);
  const tips = [];

  if (!patterns || !forecast) return ["Keep adding entries to unlock personalised coaching! 🌱"];

  // Tip 1: Trend
  if(patterns.trendDir==="rising"){
    tips.push(`📈 Your spending has been rising over recent months. Try setting a strict weekly cash limit.`);
  } else if(patterns.trendDir==="falling"){
    tips.push(`📉 Great news — your spending trend is falling. Keep it up for 2 more months to hit a savings streak!`);
  }

  // Tip 2: Peak day
  if(patterns.peakDowLabel){
    tips.push(`📅 You spend the most on ${patterns.peakDowLabel}s. Try planning your ${patterns.peakDowLabel} activities in advance to avoid impulse spending.`);
  }

  // Tip 3: Top category advice
  if(patterns.catDNA.length>0){
    const topCat = (cats.expenses||[]).find(c=>c.id===patterns.catDNA[0].id);
    if(topCat && patterns.catDNA[0].pct>35){
      tips.push(`${topCat.icon} ${Math.round(patterns.catDNA[0].pct)}% of your spending goes to ${topCat.label}. If you reduce it by just 15%, you'd save ৳${Math.round(forecast.blendedBurn*30*0.15*patterns.catDNA[0].pct/100).toLocaleString()}/month.`);
    }
  }

  // Tip 4: Budget nudge
  const noBudgetCats = (cats.expenses||[]).filter(c=>!budgets[c.id]||budgets[c.id]===0);
  if(noBudgetCats.length>0){
    tips.push(`🎯 You have no budget for ${noBudgetCats.slice(0,2).map(c=>c.label).join(" & ")}. Setting one is the single fastest way to cut spending.`);
  }

  // Tip 5: Savings rate
  if(forecast.savingsRate!==null && forecast.savingsRate<15 && forecast.curInc>0){
    const target = Math.round(forecast.curInc*0.20 - (forecast.curInc - forecast.curExp));
    tips.push(`💰 Aim to save 20% of income. You need to cut ৳${Math.abs(target).toLocaleString()} more this month to hit that target.`);
  }

  // Tip 6: median vs avg gap (impulse purchases)
  if(patterns.avgTx > patterns.medTx * 2 && patterns.medTx > 0){
    tips.push(`⚡ Your average transaction (৳${Math.round(patterns.avgTx).toLocaleString()}) is much higher than your median (৳${Math.round(patterns.medTx).toLocaleString()}). A few large impulse purchases are pulling your average up.`);
  }

  return tips.slice(0,4);
}

  const alerts = [];

        `৳${Math.round(a.curAmt).toLocaleString()} vs usual ৳${Math.round(a.mu).toLocaleString()} (${a.method} detected).`});

    alerts.push({p:4,type:"info",icon:"📅",color:"#0A84FF",
      title:`Heavy spend day ahead: ${d.dayLabel} ${d.dom}`,
      body:`Historically you spend ~৳${d.avgSpend.toLocaleString()} on this day of the month. Plan ahead!`});
  });

  // ── Streak alerts
  if(streaks.streak>=3){
    alerts.push({p:7,type:"good",icon:"🔥",color:"#FF9F0A",
      title:`${streaks.streak}-month savings streak!`,
      body:`You've been saving more than you spend for ${streaks.streak} months straight. Personal best: ${streaks.best} months.`});

    alerts.push({p:3,type:"warn",icon:"💸",color:"#FF453A",
      title:"Savings streak broken",
      body:`You haven't had a surplus month recently. ${streaks.savingMonths} of your last ${streaks.totalMonths} months were positive.`});
  }

  // ── Fitness score insight
  const fit = fitness;
  alerts.push({p:fit.score<50?2:8,type:fit.score>=70?"good":fit.score>=50?"info":"warn",icon:"🏋️",color:fit.color,

    body:`Grade ${fit.grade} · Savings ${fit.components.savings}/30 · Budget ${fit.components.budget}/25 · Trend ${fit.components.trend}/20`});

  return alerts.sort((a,b)=>a.p-b.p);
}
